name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, without the v prefix
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Trusted Publisher compatible npm
        run: npm install --global npm@11

      - name: Install dependencies
        run: npm ci

      - name: Verify requested version matches package version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module -e "import manifest from './packages/cli/package.json' with { type: 'json' }; if (process.env.RELEASE_VERSION !== manifest.version) { throw new Error('requested version ' + process.env.RELEASE_VERSION + ' does not match package version ' + manifest.version); }"

      - name: Verify checkout is current main
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          if test "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)"; then
            echo "Release checkout is not the current origin/main commit." >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test coverage
        run: npm run test:coverage

      - name: Build docs
        run: npm run docs:build

      - name: Smoke test npm package
        run: npm run test:package

      - name: Publish with provenance
        run: npm publish --workspace=feishu-md-sync --access public --provenance
