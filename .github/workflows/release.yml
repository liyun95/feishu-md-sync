name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module -e "import manifest from './packages/cli/package.json' with { type: 'json' }; if (process.env.RELEASE_TAG !== 'v' + manifest.version) { throw new Error('release tag ' + process.env.RELEASE_TAG + ' does not match package version v' + manifest.version); }"

      - name: Verify release commit is merged into main
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          release_commit=$(git rev-list -n 1 "$GITHUB_SHA")
          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo "Release commit $release_commit is not merged into origin/main." >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build docs
        run: npm run docs:build

      - name: Smoke test npm package
        run: npm run test:package

      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: npm publish --workspace=feishu-md-sync --access public --provenance
