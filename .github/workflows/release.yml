name: Publish npm package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout tagged release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install pinned release tooling
        run: npm install --global npm@11.18.0 @sigstore/cli@0.10.1

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag and source
        run: |
          node --input-type=module -e "import manifest from './packages/cli/package.json' with { type: 'json' }; if (process.env.GITHUB_REF_NAME !== 'v' + manifest.version) { throw new Error('release tag ' + process.env.GITHUB_REF_NAME + ' does not match package version v' + manifest.version); }"
          if test "$(git rev-parse HEAD)" != "$GITHUB_SHA"; then
            echo "Release checkout does not match the tag commit $GITHUB_SHA." >&2
            exit 1
          fi
          git fetch origin main:refs/remotes/origin/main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release commit $GITHUB_SHA is not merged into origin/main." >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test coverage
        run: npm run test:coverage

      - name: Build docs
        run: npm run docs:build

      - name: Smoke test npm package
        run: npm run test:package

      - name: Pack release artifact
        id: pack
        run: |
          mkdir -p release-artifacts
          npm pack --workspace=feishu-md-sync --json --pack-destination release-artifacts > release-artifacts/pack.json
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';
          const [pack] = JSON.parse(readFileSync('release-artifacts/pack.json', 'utf8'));
          appendFileSync(process.env.GITHUB_OUTPUT, [
            `name=${pack.name}`,
            `version=${pack.version}`,
            `integrity=${pack.integrity}`,
            `tarball=release-artifacts/${pack.filename}`
          ].join('\n') + '\n');
          NODE

      - name: Publish with provenance
        env:
          PACKAGE_NAME: ${{ steps.pack.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pack.outputs.version }}
          PACKAGE_INTEGRITY: ${{ steps.pack.outputs.integrity }}
          PACKAGE_TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          existing_integrity="$(npm view "$PACKAGE_NAME@$PACKAGE_VERSION" dist.integrity --json 2>/dev/null | jq -r '. // empty' || true)"
          if test -n "$existing_integrity"; then
            if test "$existing_integrity" != "$PACKAGE_INTEGRITY"; then
              echo "npm already contains $PACKAGE_NAME@$PACKAGE_VERSION with different package bytes." >&2
              exit 1
            fi
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; verifying signed provenance before recovery."
          else
            npm publish "$PACKAGE_TARBALL" --access public --provenance
          fi

      - name: Verify npm registry and provenance
        env:
          PACKAGE_NAME: ${{ steps.pack.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pack.outputs.version }}
          PACKAGE_INTEGRITY: ${{ steps.pack.outputs.integrity }}
          EXPECTED_REPOSITORY: https://github.com/${{ github.repository }}
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_REF: ${{ github.ref }}
          EXPECTED_WORKFLOW: .github/workflows/release.yml
          EXPECTED_BUILD_TYPE: https://slsa-framework.github.io/github-actions-buildtypes/workflow/v1
          EXPECTED_BUILDER: https://github.com/actions/runner/github-hosted
          EXPECTED_EVENT: push
          EXPECTED_CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
          SIGSTORE_BUNDLE_PATH: release-artifacts/npm-provenance.sigstore
        run: |
          for attempt in {1..12}; do
            if node .github/scripts/download-npm-provenance.mjs \
              && sigstore verify "$SIGSTORE_BUNDLE_PATH" \
                --certificate-identity-uri "$EXPECTED_CERTIFICATE_IDENTITY" \
                --certificate-issuer 'https://token.actions.githubusercontent.com' \
              && node .github/scripts/verify-npm-provenance.mjs; then
              exit 0
            fi
            sleep 5
          done
          echo "npm registry provenance did not match $GITHUB_REF at $GITHUB_SHA." >&2
          exit 1

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tagged release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create matching GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file=".github/releases/$GITHUB_REF_NAME.md"
          test -f "$notes_file"
          if test "$(git rev-parse HEAD)" != "$GITHUB_SHA"; then
            echo "Release checkout does not match the tag commit $GITHUB_SHA." >&2
            exit 1
          fi
          if test "$(git rev-list -n 1 "$GITHUB_REF_NAME")" != "$GITHUB_SHA"; then
            echo "Tag $GITHUB_REF_NAME does not point to $GITHUB_SHA." >&2
            exit 1
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "feishu-md-sync $GITHUB_REF_NAME" --notes-file "$notes_file" --draft=false --prerelease=false --latest
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "feishu-md-sync $GITHUB_REF_NAME" --notes-file "$notes_file" --latest
          fi
