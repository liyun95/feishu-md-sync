name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module -e "import manifest from './packages/cli/package.json' with { type: 'json' }; if (process.env.RELEASE_TAG !== 'v' + manifest.version) { throw new Error('release tag ' + process.env.RELEASE_TAG + ' does not match package version v' + manifest.version); }"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build docs
        run: npm run docs:build

      - name: Smoke test npm package
        run: npm run test:package

      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: npm publish --workspace=feishu-md-sync --access public --provenance
